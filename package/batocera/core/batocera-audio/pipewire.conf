# PipeWire config optimized for REG-Linux
# Based on pipewire.conf version 1.4.4

context.properties = {
    link.max-buffers = 16  # Maximum number of buffers per link
    core.daemon = true     # Enable daemon mode (background service)
    core.name   = pipewire-0  # Core and socket name

    default.clock.rate = 48000           # Default sample rate
    default.clock.allowed-rates = [ 48000 44100 ]  # Supported sample rates
    default.clock.min-quantum = 32       # Minimum quantum (buffer size in frames)
    default.clock.max-quantum = 2048     # Maximum quantum

    log.level = 2               # Logging level (0 = none, 2 = warning/info)
    mem.allow-mlock = true     # Allow memory locking for real-time threads
    mem.mlock-all = false      # Do not lock all memory pages

    module.x11.bell = false          # Disable X11 bell integration
    module.access = true             # Enable access control module
    module.jackdbus-detect = true   # Enable JACK detection support
}

context.properties.rules = [
    { matches = [ { cpu.vm.name = !null } ]
      actions = {
        update-props = {
            default.clock.min-quantum = 128  # Increase latency when running in a VM
        }
      }
    }
]

context.spa-libs = {
    audio.convert.* = audioconvert/libspa-audioconvert  # Audio format conversion
    avb.*           = avb/libspa-avb                     # AVB support
    api.alsa.*      = alsa/libspa-alsa                   # ALSA backend
    api.v4l2.*      = v4l2/libspa-v4l2                   # V4L2 video input
    api.bluez5.*    = bluez5/libspa-bluez5               # Bluetooth audio
    api.jack.*      = jack/libspa-jack                   # JACK support
    support.*       = support/libspa-support             # Generic support
    video.convert.* = videoconvert/libspa-videoconvert   # Video format conversion
    api.libcamera.* = libcamera/libspa-libcamera         # Camera input
    api.vulkan.*    = vulkan/libspa-vulkan               # Vulkan compute support
}

context.modules = [
    { name = libpipewire-module-rt
      args = { nice.level = -11 }  # Improve thread scheduling
      flags = [ ifexists nofail ]
    }
    { name = libpipewire-module-protocol-native }       # Native PipeWire protocol
    { name = libpipewire-module-metadata }              # Shared metadata objects
    { name = libpipewire-module-spa-device-factory }    # SPA device factory
    { name = libpipewire-module-spa-node-factory }      # SPA node factory
    { name = libpipewire-module-client-node }           # Support for client-side nodes
    { name = libpipewire-module-client-device }         # Support for client-side devices
    { name = libpipewire-module-access }                # Access control
    { name = libpipewire-module-adapter }               # Node adapter with resampler/converter
    { name = libpipewire-module-link-factory }          # Factory for linking nodes
    { name = libpipewire-module-session-manager }       # Session manager support
    { name = libpipewire-module-jackdbus-detect         # JACK client auto-detection
      flags = [ ifexists nofail ]
    }
    { name = libpipewire-module-portal                  # Flatpak/portal integration
      flags = [ ifexists nofail ]
    }
]

context.objects = [
    # Dummy driver used when no real audio device is present
    { factory = spa-node-factory
      args = {
        factory.name = support.node.driver
        node.name    = Dummy-Driver
        node.group   = pipewire.dummy
        node.sync-group = sync.dummy
        priority.driver = 20000
      }
    }
    # Freewheel driver for non-realtime or benchmarking usage
    { factory = spa-node-factory
      args = {
        factory.name = support.node.driver
        node.name    = Freewheel-Driver
        node.group   = pipewire.freewheel
        node.sync-group = sync.dummy
        node.freewheel  = true
        priority.driver = 19000
      }
    }
    # ALSA PCM input device node (enabled for embedded systems)
    { factory = adapter
      args = {
        factory.name          = api.alsa.pcm.source
        node.name             = "alsa-source"
        node.description      = "ALSA PCM Source"
        media.class           = "Audio/Source"
        api.alsa.path         = "hw:0"
        api.alsa.period-size  = 256
        api.alsa.disable-mmap = false
        audio.format          = "S16LE"
        audio.rate            = 48000
        audio.channels        = 2
        audio.position        = [ FL FR ]
      }
    }
]

context.exec = [
    # Start the WirePlumber session manager if not already handled by systemd
    { path = "/usr/bin/wireplumber" args = ""
      condition = [ { exec.session-manager = null } { exec.session-manager = true } ] }
    # Launch PulseAudio compatibility daemon (pipewire-pulse)
    { path = "/usr/bin/pipewire" args = [ "-c" "pipewire-pulse.conf" ]
      condition = [ { exec.pipewire-pulse = null } { exec.pipewire-pulse = true } ] }
]
